<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#7aa2f7" font-size="20" font-family="Arial">AI DevOps Pipeline</text>
  
  <!-- Pipeline Stages -->
  <rect x="30" y="80" width="120" height="60" rx="8" fill="#f7768e" opacity="0.2" stroke="#f7768e"/>
  <text x="90" y="105" text-anchor="middle" fill="#f7768e" font-size="12">Infrastructure</text>
  <text x="90" y="120" text-anchor="middle" fill="#f7768e" font-size="10">Event Detected</text>
  
  <rect x="180" y="80" width="120" height="60" rx="8" fill="#e0af68" opacity="0.2" stroke="#e0af68"/>
  <text x="240" y="105" text-anchor="middle" fill="#e0af68" font-size="12">MiMo v2.5</text>
  <text x="240" y="120" text-anchor="middle" fill="#e0af68" font-size="10">Root Cause Analysis</text>
  
  <rect x="330" y="80" width="120" height="60" rx="8" fill="#9ece6a" opacity="0.2" stroke="#9ece6a"/>
  <text x="390" y="105" text-anchor="middle" fill="#9ece6a" font-size="12">Code Generation</text>
  <text x="390" y="120" text-anchor="middle" fill="#9ece6a" font-size="10">Fix Scripts + IaC</text>
  
  <rect x="480" y="80" width="120" height="60" rx="8" fill="#7aa2f7" opacity="0.2" stroke="#7aa2f7"/>
  <text x="540" y="105" text-anchor="middle" fill="#7aa2f7" font-size="12">Paperclip</text>
  <text x="540" y="120" text-anchor="middle" fill="#7aa2f7" font-size="10">Approval Gate</text>
  
  <rect x="630" y="80" width="120" height="60" rx="8" fill="#bb9af7" opacity="0.2" stroke="#bb9af7"/>
  <text x="690" y="105" text-anchor="middle" fill="#bb9af7" font-size="12">Deploy</text>
  <text x="690" y="120" text-anchor="middle" fill="#bb9af7" font-size="10">Auto-Deploy</text>
  
  <!-- Arrows -->
  <line x1="150" y1="110" x2="180" y2="110" stroke="#7aa2f7" stroke-width="2"/>
  <line x1="300" y1="110" x2="330" y2="110" stroke="#7aa2f7" stroke-width="2"/>
  <line x1="450" y1="110" x2="480" y2="110" stroke="#7aa2f7" stroke-width="2"/>
  <line x1="600" y1="110" x2="630" y2="110" stroke="#7aa2f7" stroke-width="2"/>
  
  <!-- Output Examples -->
  <text x="400" y="200" text-anchor="middle" fill="#565f89" font-size="14">Generated Outputs</text>
  
  <rect x="50" y="230" width="200" height="80" rx="6" fill="#16161e" stroke="#30363d"/>
  <text x="150" y="255" text-anchor="middle" fill="#9ece6a" font-size="11">docker-compose.yml</text>
  <text x="150" y="275" text-anchor="middle" fill="#565f89" font-size="9">Multi-container orchestration</text>
  
  <rect x="300" y="230" width="200" height="80" rx="6" fill="#16161e" stroke="#30363d"/>
  <text x="400" y="255" text-anchor="middle" fill="#e0af68" font-size="11">k8s-deployment.yaml</text>
  <text x="400" y="275" text-anchor="middle" fill="#565f89" font-size="9">Kubernetes manifests</text>
  
  <rect x="550" y="230" width="200" height="80" rx="6" fill="#16161e" stroke="#30363d"/>
  <text x="650" y="255" text-anchor="middle" fill="#7aa2f7" font-size="11">.github/workflows/</text>
  <text x="650" y="275" text-anchor="middle" fill="#565f89" font-size="9">CI/CD pipelines</text>
  
  <!-- Metrics -->
  <rect x="100" y="340" width="150" height="40" rx="6" fill="#3fb950" opacity="0.1" stroke="#3fb950"/>
  <text x="175" y="365" text-anchor="middle" fill="#3fb950" font-size="11">Response: 3.3s</text>
  
  <rect x="325" y="340" width="150" height="40" rx="6" fill="#3fb950" opacity="0.1" stroke="#3fb950"/>
  <text x="400" y="365" text-anchor="middle" fill="#3fb950" font-size="11">Configs: 200+</text>
  
  <rect x="550" y="340" width="150" height="40" rx="6" fill="#3fb950" opacity="0.1" stroke="#3fb950"/>
  <text x="625" y="365" text-anchor="middle" fill="#3fb950" font-size="11">Accuracy: 95%</text>
</svg>